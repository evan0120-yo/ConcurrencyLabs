# ConcurrencyLabs 本機基礎設施
#
# 核心（預設啟動）：Postgres + Redis + Kafka + RocketMQ
#   docker compose up -d
#
# NoSQL（需要才啟動，符合「有壓力才登場」的原則）：Mongo + Cassandra + ClickHouse
#   docker compose --profile nosql up -d
#
# 注意：以下設定假設「應用程式跑在 host（IDE / mvn）」，所以對外都 advertise 成 localhost。
#       若之後把 app 也放進這個 compose 網路，需把 localhost 改成各服務的 service 名稱。

name: concurrency-labs

services:
  # ---------- 核心：強一致真相來源 ----------
  postgres:
    image: postgres:16
    container_name: cl-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: concurrency_labs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- 核心：快取 / 熱點 / 分布式鎖 ----------
  redis:
    image: redis:7-alpine
    container_name: cl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- 核心：Kafka（寫爆 / streaming / ingestion）KRaft 單節點 ----------
  kafka:
    image: apache/kafka:3.9.0
    container_name: cl-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ---------- 核心：RocketMQ（任務 / 延遲 / 順序 / 事務訊息）----------
  rmqnamesrv:
    image: apache/rocketmq:5.3.1
    container_name: cl-rmqnamesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rmqbroker:
    image: apache/rocketmq:5.3.1
    container_name: cl-rmqbroker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rmqnamesrv:9876
    volumes:
      - ./docker/rocketmq/broker.conf:/etc/rocketmq/broker.conf
    command: sh mqbroker -c /etc/rocketmq/broker.conf -n rmqnamesrv:9876
    depends_on:
      - rmqnamesrv

  # ---------- NoSQL（profile: nosql，預設不啟動）----------
  mongo:
    image: mongo:7
    container_name: cl-mongo
    profiles: ["nosql"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  cassandra:
    image: cassandra:5
    container_name: cl-cassandra
    profiles: ["nosql"]
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: cl-clickhouse
    profiles: ["nosql"]
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse

volumes:
  pg-data:
  redis-data:
  kafka-data:
  mongo-data:
  cassandra-data:
  clickhouse-data:
