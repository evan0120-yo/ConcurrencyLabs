# RocketMQ broker 最小設定（本機開發用）
#
# brokerIP1 = 127.0.0.1 是關鍵：
#   broker 會把這個位址回報給 client，client 之後用它連過來。
#   假設 app 跑在 host，所以回報 127.0.0.1（搭配 compose 對外 expose 10911）。
#   若之後把 app 放進 compose 網路，改成 rmqbroker（service 名稱）。

brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
brokerIP1 = 127.0.0.1

deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH

# 開發方便：允許自動建立 topic（正式環境不建議）
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true
