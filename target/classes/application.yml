spring:
  application:
    name: concurrency-labs
  datasource:
    url: jdbc:postgresql://localhost:5432/concurrency_labs
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # labs 尚無 entity，先用 none 讓 app 在無 schema 時也能啟動；
      # 各情境開始寫 entity 後可視需要改 validate / update。
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
